# rk3588-media-stack.ci.ini
#
# Container/GitHub Actions config.
# This builds local binary .deb packages under /output and installs each package
# inside the container so later components can link against earlier ones.
#
# The install prefix is /usr/local, matching upstream source-install defaults.
# If you prefer Debian-policy-style packages under /usr, change install_prefix
# to /usr and rebuild.

[paths]
build_root = /build/rk3588-media-stack
package_output = /output
install_prefix = /usr/local

[build]
# GitHub public arm64 hosted runners are currently 4 vCPU, so 4 is a safe default.
jobs = 4
sudo = sudo

[packages]
build_debs = yes
install_debs = yes
install_direct = no
deb_iteration = 1
deb_maintainer = local <root@localhost>

[ffmpeg]
repo = https://github.com/FFmpeg/FFmpeg.git
# master is latest but the external v4l2request patch can lag.
# Pin to n7.1 or a known-good commit if patching fails.
ref = master
v4l2request_patch_url = https://raw.githubusercontent.com/LibreELEC/LibreELEC.tv/master/packages/multimedia/ffmpeg/patches/v4l2-request/ffmpeg-001-v4l2-request.patch
package_name = ffmpeg-v4l2request-rockchip
configure_extra =

[mpv]
repo = https://github.com/philipl/mpv.git
ref = v4l2request
package_name = mpv-v4l2request-rockchip
meson_extra =

[kodi]
repo = https://github.com/xbmc/xbmc.git
ref = master
package_name = kodi-v4l2request-rockchip
joystick_package_name = kodi-v4l2request-peripheral-joystick-rockchip
build_joystick_addon = yes
cmake_extra =
