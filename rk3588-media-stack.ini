# rk3588-media-stack.ini
#
# Config for build_rk3588_media_stack.py
#
# Default install prefix is /usr/local, matching the usual upstream source
# install prefix for FFmpeg, mpv and Kodi. This means executables normally land in:
#   /usr/local/bin/ffmpeg
#   /usr/local/bin/ffprobe
#   /usr/local/bin/mpv
#   /usr/local/bin/kodi
#
# If you want an isolated install, change install_prefix to /opt/v4l2request
# or pass --install-prefix /opt/v4l2request on the command line.

[paths]
build_root = ~/src/rk3588-media-stack
package_output = ~/rk3588-media-stack-debs
install_prefix = /usr/local

[build]
jobs = 0
sudo = sudo

[packages]
# These are pragmatic local binary packages made with fpm.
# They are useful for reinstalling and tracking files with dpkg.
build_debs = yes
install_debs = yes

# If install_direct = yes, the staged tree is also rsync-installed directly.
# Usually leave this off when install_debs = yes.
install_direct = no

deb_iteration = 1
deb_maintainer = local <root@localhost>

[ffmpeg]
repo = https://code.ffmpeg.org/Kwiboo/FFmpeg.git

# "master" is latest, but may break when the external v4l2request patch lags.
# If patch application fails, try n7.1 or pin a known-good commit.
ref = v4l2request-2025-v3-rkvdec


# Set apply_patch = no when using an FFmpeg fork/branch that already contains v4l2request support.
apply_patch = no
v4l2request_patch_url = https://raw.githubusercontent.com/LibreELEC/LibreELEC.tv/master/packages/multimedia/ffmpeg/patches/v4l2-request/ffmpeg-001-v4l2-request.patch

package_name = ffmpeg-v4l2request-rockchip

# Space-separated extra configure flags, for example:
# configure_extra = --enable-libdav1d
configure_extra =

[mpv]
# v4l2request support is not expected from stock mpv master here.
repo = https://github.com/philipl/mpv.git
ref = v4l2request

package_name = mpv-v4l2request-rockchip

# Space-separated extra Meson options.
meson_extra =

[kodi]
repo = https://github.com/xbmc/xbmc.git
ref = master

package_name = kodi-v4l2request-rockchip
joystick_package_name = kodi-v4l2request-peripheral-joystick-rockchip

build_joystick_addon = yes

# Space-separated extra CMake options.
# Examples:
# cmake_extra = -DENABLE_INTERNAL_CROSSGUID=ON
cmake_extra =
