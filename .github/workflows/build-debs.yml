name: Build RK3588 media stack debs

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: "FFmpeg ref, tag, branch or commit"
        required: false
        default: "master"
      mpv_ref:
        description: "mpv ref, tag, branch or commit"
        required: false
        default: "v4l2request"
      kodi_ref:
        description: "Kodi ref, tag, branch or commit"
        required: false
        default: "master"
      target:
        description: "Build target list"
        required: false
        default: "ffmpeg mpv kodi joystick"
  push:
    branches:
      - main
      - master
    paths:
      - "build_rk3588_media_stack.py"
      - "rk3588-media-stack*.ini"
      - "docker/**"
      - ".github/workflows/build-debs.yml"

jobs:
  build-arm64-debs:
    name: Build ARM64 debs
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare output/cache directories
        run: |
          mkdir -p artifacts
          mkdir -p "${HOME}/.cache/rk3588-ccache"

      - name: Build builder image
        run: |
          docker build \
            --platform linux/arm64 \
            -f docker/Dockerfile \
            -t rk3588-media-builder:arm64 \
            .

      - name: Build deb packages
        env:
          FFMPEG_REF: ${{ github.event.inputs.ffmpeg_ref || 'master' }}
          MPV_REF: ${{ github.event.inputs.mpv_ref || 'v4l2request' }}
          KODI_REF: ${{ github.event.inputs.kodi_ref || 'master' }}
          TARGETS: ${{ github.event.inputs.target || 'ffmpeg mpv kodi joystick' }}
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/work" \
            -v "${{ github.workspace }}/artifacts:/output" \
            -v "${HOME}/.cache/rk3588-ccache:/ccache" \
            rk3588-media-builder:arm64 \
            --config /work/rk3588-media-stack.ci.ini \
            --ffmpeg-ref "${FFMPEG_REF}" \
            --mpv-ref "${MPV_REF}" \
            --kodi-ref "${KODI_REF}" \
            ${TARGETS}

      - name: List packages
        run: |
          ls -lh artifacts
          dpkg-deb -I artifacts/*.deb | sed -n '1,80p' || true

      - name: Upload deb packages
        uses: actions/upload-artifact@v4
        with:
          name: rk3588-media-stack-debs-arm64
          path: artifacts/*.deb
          if-no-files-found: error
